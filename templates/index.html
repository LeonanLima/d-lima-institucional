<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D'LIMA Engenharia | Minha Casa Minha Vida</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; color: #333; margin: 0; padding: 0; }
        .container { max-width: 600px; margin: 50px auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .logo { text-align: center; margin-bottom: 20px; font-size: 24px; font-weight: bold; color: #0056b3; }
        h2 { text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="tel"], input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button:hover { background-color: #004494; }
        .alert { background-color: #d4edda; color: #155724; padding: 10px; border-radius: 4px; margin-bottom: 20px; text-align: center; }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">D'LIMA Engenharia</div>
    <h2>Simulação - Minha Casa Minha Vida</h2>
    <p style="text-align: center;">Saia do aluguel! Preencha os dados abaixo para uma simulação gratuita.</p>

    {% if sucesso %}
        <div class="alert">Cadastro recebido com sucesso! Nossa equipe entrará em contato em breve.</div>
    {% endif %}

    <form action="/cadastro" method="POST">
        <div class="form-group">
            <label for="nome">Nome Completo:</label>
            <input type="text" id="nome" name="nome" required>
        </div>
        
        <div class="form-group">
            <label for="telefone">WhatsApp:</label>
            <input type="tel" id="telefone" name="telefone" placeholder="(27) 99999-9999" required>
        </div>
        
        <div class="form-group">
            <label for="renda">Renda Familiar Bruta (R$):</label>
            <input type="number" id="renda" name="renda" placeholder="Ex: 3500" required>
        </div>

        <button type="submit">Solicitar Simulação</button>
    </form>
</div>

</body>
</html>
