<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D'LIMA Engenharia | Excelência e Abundância</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icon = ({ name, className }) => {
            useEffect(() => {
                if (window.lucide) { window.lucide.createIcons(); }
            }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const App = () => {
            const [copied, setCopied] = useState(false);
            const copyEmail = () => {
                navigator.clipboard.writeText("contato@dlimaengenharia.org").then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                });
            };

            const values = [
                { title: "Mentalidade de Abundância", desc: "Acreditamos que para crescer é preciso contribuir.", icon: "heart" },
                { title: "Decisões Baseadas em Dados", desc: "Utilizamos inteligência de mercado e dados.", icon: "bar-chart-3" },
                { title: "Disciplina Processual", desc: "A ordem e a padronização são os alicerces.", icon: "shield-check" },
                { title: "Crescimento Sustentado", desc: "Buscamos previsibilidade e escala.", icon: "trending-up" }
            ];

            return (
                <div className="min-h-screen bg-[#F9F8F6] text-[#2D3A2C] overflow-x-hidden">
                    <header className="bg-[#0F120F] text-[#EFEBE0] py-12 md:py-32 px-4 text-center">
                        <div className="max-w-7xl mx-auto">
                            <div className="mb-8 md:mb-12">
                                {/* CAMINHO QUE FUNCIONA NA HOSTINGER */}
                                <img
                                    src="static/minha-logo.png"
                                    className="h-44 md:h-80 w-auto object-contain mx-auto drop-shadow-2xl"
                                    alt="D'LIMA Engenharia"
                                />
                            </div>
                            <h1 className="text-3xl md:text-6xl font-light mb-6">
                                Excelência em <span className="font-bold text-[#B89B5E]">Engenharia</span>
                            </h1>
                        </div>
                    </header>

                    <section className="py-16 px-6 max-w-6xl mx-auto grid md:grid-cols-3 gap-10">
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border text-center">
                            <Icon name="target" className="text-[#B89B5E] mx-auto mb-4" />
                            <h3 className="text-xl font-bold mb-3">Missão</h3>
                            <p className="text-gray-600 text-sm">Transformar o cenário da engenharia.</p>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border text-center">
                            <Icon name="eye" className="text-[#B89B5E] mx-auto mb-4" />
                            <h3 className="text-xl font-bold mb-3">Visão</h3>
                            <p className="text-gray-600 text-sm">Ser a referência em inteligência na gestão.</p>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border text-center">
                            <Icon name="users" className="text-[#B89B5E] mx-auto mb-4" />
                            <h3 className="text-xl font-bold mb-3">Cultura</h3>
                            <p className="text-gray-600 text-sm">Pautada na abundância e fé em Deus.</p>
                        </div>
                    </section>

                    <section id="contato" className="py-12 px-6 max-w-6xl mx-auto">
                        <div className="bg-white rounded-[2rem] p-8 md:p-16 shadow-xl border flex flex-col items-center gap-6">
                            <h2 className="text-3xl font-bold">Entre em <span className="text-[#B89B5E]">Contato</span></h2>
                            <div className="flex flex-wrap justify-center gap-4">
                                <a href="https://wa.me/5528999646592" className="bg-[#B89B5E] text-white px-8 py-3 rounded-xl font-bold">WhatsApp</a>
                                <button onClick={copyEmail} className="border-2 border-[#B89B5E] text-[#B89B5E] px-8 py-3 rounded-xl font-bold">
                                    {copied ? "E-mail Copiado!" : "Copiar E-mail"}
                                </button>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
