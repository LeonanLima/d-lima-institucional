<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>D'LIMA Engenharia | Excelência e Abundância</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        h1, h2, h3, h4 { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        {% raw %}
        const { useState, useEffect } = React;
        const Icon = ({ name, className }) => {
            useEffect(() => { if (window.lucide) { window.lucide.createIcons(); } }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };
        const App = () => {
            const [copied, setCopied] = useState(false);
            const copyEmail = () => {
                navigator.clipboard.writeText("contato@dlimaengenharia.org").then(() => {
                    setCopied(true);
                    setTimeout(() => setCopied(false), 2500);
                });
            };
            const values = [
                { title: "Mentalidade de Abundância", desc: "Acreditamos que para crescer é preciso contribuir.", icon: "heart" },
                { title: "Decisões Baseadas em Dados", desc: "Utilizamos inteligência de mercado e dados.", icon: "bar-chart-3" },
                { title: "Disciplina Processual", desc: "Processos claros geram resultados replicáveis.", icon: "shield-check" },
                { title: "Crescimento Sustentado", desc: "Buscamos a tríade: Previsibilidade, Resistência e Escala.", icon: "trending-up" }
            ];
            return (
                <div className="min-h-screen bg-[#F9F8F6] text-[#2D3A2C]">
                    <header className="bg-[#0F120F] text-[#EFEBE0] py-12 md:py-32 px-4 text-center relative overflow-hidden">
                        <div className="max-w-7xl mx-auto relative z-10">
                            <img src="/static/minha-logo.png" className="h-44 md:h-80 mx-auto mb-8 object-contain drop-shadow-2xl" alt="D'LIMA Engenharia" />
                            <h1 className="text-3xl md:text-6xl font-light mb-6">Excelência em <span className="font-bold text-[#B89B5E]">Engenharia</span></h1>
                            <p className="text-xl text-[#7C8B7A]">Construindo as bases do próximo nível.</p>
                        </div>
                    </header>
                    <section className="py-16 px-6 max-w-6xl mx-auto grid md:grid-cols-3 gap-10 text-center">
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-[#EFEBE0]">
                            <Icon name="target" className="text-[#B89B5E] mx-auto mb-4 w-12 h-12" />
                            <h3 className="text-xl font-bold mb-2">Missão</h3>
                            <p className="text-sm text-gray-600">Transformar o cenário da engenharia com processos eficientes.</p>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-[#EFEBE0]">
                            <Icon name="eye" className="text-[#B89B5E] mx-auto mb-4 w-12 h-12" />
                            <h3 className="text-xl font-bold mb-2">Visão</h3>
                            <p className="text-sm text-gray-600">Ser referência em inteligência e gestão operacional.</p>
                        </div>
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-[#EFEBE0]">
                            <Icon name="users" className="text-[#B89B5E] mx-auto mb-4 w-12 h-12" />
                            <h3 className="text-xl font-bold mb-2">Cultura</h3>
                            <p className="text-sm text-gray-600">Pautada na abundância e fé em Deus.</p>
                        </div>
                    </section>
                    <section className="bg-[#EFEBE0] py-24 px-6 text-center">
                        <h2 className="text-4xl font-bold mb-12">Tripé da <span className="text-[#B89B5E]">Expansão</span></h2>
                        <div className="flex flex-wrap justify-center gap-12">
                            {["Sustentação", "Resistência", "Escala"].map((t, i) => (
                                <div key={i} className="flex items-center gap-4 text-2xl font-bold">
                                    <span className="text-[#B89B5E] border-2 border-[#B89B5E] rounded-full w-12 h-12 flex items-center justify-center">{i+1}</span>
                                    {t}
                                </div>
                            ))}
                        </div>
                    </section>
                    <footer className="bg-[#0F120F] text-white py-12 text-center">
                        <h2 className="text-3xl font-bold mb-8">Entre em <span className="text-[#B89B5E]">Contato</span></h2>
                        <div className="flex justify-center gap-4 flex-wrap">
                            <a href="https://wa.me/5528999646592" className="bg-[#B89B5E] px-8 py-3 rounded-xl font-bold">WhatsApp</a>
                            <button onClick={copyEmail} className="border-2 border-[#B89B5E] text-[#B89B5E] px-8 py-3 rounded-xl font-bold">
                                {copied ? "Copiado!" : "Copiar E-mail"}
                            </button>
                        </div>
                        <p className="mt-12 text-gray-500 text-xs">© 2026 D'LIMA Engenharia. Abundância é estratégia.</p>
                    </footer>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        {% endraw %}
    </script>
</body>
</html>
